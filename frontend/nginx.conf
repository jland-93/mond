# 🌙 Mond Frontend nginx — static SPA + /api 프록시
#
# 보안 헤더(HSTS/CSP/Permissions-Policy 등)는 Ingress에서 추가 권장.

server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 정적 자산 캐시
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # 백엔드 프록시 — Helm에서 ENV 또는 같은 클러스터의 backend Service 주소로 치환.
  # docker-compose 사용 시는 ingress 없이 frontend → backend:8000으로 통신.
  location /api/ {
    proxy_pass         ${MOND_API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # MCP HTTP (SSE) — 같은 도메인으로 노출하고 싶을 때
  location /mcp/ {
    proxy_pass         ${MOND_API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   Connection "";
    proxy_buffering    off;
    proxy_read_timeout 1h;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
