# 🌙 Mond — 로컬 개발용 docker-compose
#
# 사용법:
#   1. `cp .env.example .env`
#   2. `docker compose up -d`
#   3. 백엔드: http://localhost:8000/docs
#      프론트: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    container_name: mond-postgres
    environment:
      POSTGRES_DB: mond
      POSTGRES_USER: mond
      POSTGRES_PASSWORD: mond
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mond -d mond"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [mond-network]

  redis:
    image: redis:7-alpine
    container_name: mond-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [mond-network]
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mond-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mond:mond@postgres:5432/mond
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      SECRET_KEY: ${SECRET_KEY:-development-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GENERIC_WEBHOOK_URL: ${GENERIC_WEBHOOK_URL:-}
      NOTIFY_MIN_SEVERITY: ${NOTIFY_MIN_SEVERITY:-high}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ko}
      MCP_HTTP_ENABLED: ${MCP_HTTP_ENABLED:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [mond-network]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mond-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks: [mond-network]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  mond-network:
    driver: bridge
