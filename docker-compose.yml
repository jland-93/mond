# 🌙 Mond — 로컬 개발용 docker-compose
#
# 사용법:
#   1. `cp .env.example .env`
#   2. `docker compose up -d`
#   3. 백엔드: http://localhost:8000/docs
#      프론트: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    container_name: mond-postgres
    environment:
      POSTGRES_DB: mond
      POSTGRES_USER: mond
      POSTGRES_PASSWORD: mond
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mond -d mond"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [mond-network]

  redis:
    image: redis:7-alpine
    container_name: mond-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [mond-network]
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mond-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://mond:mond@postgres:5432/mond
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      SECRET_KEY: ${SECRET_KEY:-development-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GENERIC_WEBHOOK_URL: ${GENERIC_WEBHOOK_URL:-}
      NOTIFY_MIN_SEVERITY: ${NOTIFY_MIN_SEVERITY:-high}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ko}
      MCP_HTTP_ENABLED: ${MCP_HTTP_ENABLED:-false}
      SCAN_QUEUE_ENABLED: ${SCAN_QUEUE_ENABLED:-false}
      AUTH_MODE: ${AUTH_MODE:-dev}
      SSO_PROVIDERS: ${SSO_PROVIDERS:-}
      SSO_KEYCLOAK_ISSUER: ${SSO_KEYCLOAK_ISSUER:-}
      SSO_KEYCLOAK_CLIENT_ID: ${SSO_KEYCLOAK_CLIENT_ID:-}
      SSO_KEYCLOAK_CLIENT_SECRET: ${SSO_KEYCLOAK_CLIENT_SECRET:-}
      SSO_OKTA_ISSUER: ${SSO_OKTA_ISSUER:-}
      SSO_OKTA_CLIENT_ID: ${SSO_OKTA_CLIENT_ID:-}
      SSO_OKTA_CLIENT_SECRET: ${SSO_OKTA_CLIENT_SECRET:-}
      SSO_GOOGLE_CLIENT_ID: ${SSO_GOOGLE_CLIENT_ID:-}
      SSO_GOOGLE_CLIENT_SECRET: ${SSO_GOOGLE_CLIENT_SECRET:-}
      SSO_REDIRECT_BASE: ${SSO_REDIRECT_BASE:-http://localhost:3000}
      SSO_ADMIN_EMAILS: ${SSO_ADMIN_EMAILS:-}
      SESSION_COOKIE: ${SESSION_COOKIE:-mond_session}
      SESSION_DAYS: ${SESSION_DAYS:-7}
      SESSION_SECURE: ${SESSION_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [mond-network]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Celery worker — SCAN_QUEUE_ENABLED=true 일 때만 의미 있음.
  # 기본 인라인 모드에서는 컨테이너가 idle하게 떠있을 뿐 영향 없음.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mond-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://mond:mond@postgres:5432/mond
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-development-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SCAN_QUEUE_ENABLED: ${SCAN_QUEUE_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GENERIC_WEBHOOK_URL: ${GENERIC_WEBHOOK_URL:-}
      NOTIFY_MIN_SEVERITY: ${NOTIFY_MIN_SEVERITY:-high}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [mond-network]
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mond-frontend
    # nginx-unprivileged는 컨테이너 안에서 8080을 listen. host 3000 → container 8080.
    ports:
      - "3000:8080"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks: [mond-network]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  mond-network:
    driver: bridge
