# 🌙 Mond CI — backend + frontend 빌드 검증

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 동일 브랜치/PR의 새 커밋이 들어오면 이전 실행 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# GitHub Actions의 JS 액션을 Node 24로 강제 (Node 20 deprecation 회피)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Compile all
        run: python -m compileall -q app main.py mcp_server.py

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python -m pytest -q

  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check + build
        run: npm run build
