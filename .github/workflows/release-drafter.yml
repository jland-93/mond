# 🌙 Release Drafter — PR 머지마다 다음 릴리즈 노트 draft 갱신 + Conventional Commits 자동 라벨링
# 태그 push할 때는 .github/workflows/release.yml이 따로 빌드/푸시. 이 workflow는 노트 초안만.

name: Release Drafter

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ "opened", "reopened", "synchronize", "edited" ]

permissions:
  contents: write       # draft release 생성/갱신
  pull-requests: write  # autolabel

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    # 첫 도입 PR에서는 config가 default branch에 없어 fail이 예상됨.
    # 머지 후 main에 config 들어가면 정상 동작 → PR 단계에서는 머지 차단하지 않음.
    continue-on-error: true
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          disable-autolabeler: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
