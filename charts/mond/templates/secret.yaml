{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mond.secretName" . }}
  labels: {{- include "mond.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secrets.secretKey 필수 — 운영에선 32자 이상 무작위 값" .Values.secrets.secretKey | quote }}
  DATABASE_URL: {{ include "mond.databaseUrl" . | quote }}
  REDIS_URL:    {{ include "mond.redisUrl" . | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  SSO_PROVIDERS: {{ .Values.secrets.ssoProviders | quote }}
  SSO_KEYCLOAK_ISSUER: {{ .Values.secrets.ssoKeycloakIssuer | quote }}
  SSO_KEYCLOAK_CLIENT_ID: {{ .Values.secrets.ssoKeycloakClientId | quote }}
  SSO_KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.ssoKeycloakClientSecret | quote }}
  SSO_OKTA_ISSUER: {{ .Values.secrets.ssoOktaIssuer | quote }}
  SSO_OKTA_CLIENT_ID: {{ .Values.secrets.ssoOktaClientId | quote }}
  SSO_OKTA_CLIENT_SECRET: {{ .Values.secrets.ssoOktaClientSecret | quote }}
  SSO_GOOGLE_CLIENT_ID: {{ .Values.secrets.ssoGoogleClientId | quote }}
  SSO_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.ssoGoogleClientSecret | quote }}
  SSO_ADMIN_EMAILS: {{ .Values.secrets.ssoAdminEmails | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  GENERIC_WEBHOOK_URL: {{ .Values.secrets.genericWebhookUrl | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
{{- end }}
