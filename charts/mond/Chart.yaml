apiVersion: v2
name: mond
description: 🌙 Mond — AI-Powered Self-Service DevSecOps Platform
type: application
version: 0.3.0
appVersion: "0.3.0"
home: https://github.com/jland-93/mond
sources:
  - https://github.com/jland-93/mond
maintainers:
  - name: jland-93
    url: https://github.com/jland-93
keywords:
  - devsecops
  - security
  - sast
  - dast
  - sca
  - compliance
  - mcp
  - ai
  - claude

# 의존성: 기본은 in-cluster Postgres/Redis. 운영은 dependencies enabled=false + values에 외부 URL.
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
